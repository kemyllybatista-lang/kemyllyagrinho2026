<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Fazenda HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌱 Mini Fazenda</h1>
    
    <div id="painel">
        Moedas: $<span id="moedas">10</span>
    </div>

    <div id="fazenda">
        <div class="lote" onclick="interagir(0)" id="lote-0"></div>
        <div class="lote" onclick="interagir(1)" id="lote-1"></div>
        <div class="lote" onclick="interagir(2)" id="lote-2"></div>
        <div class="lote" onclick="interagir(3)" id="lote-3"></div>
        <div class="lote" onclick="interagir(4)" id="lote-4"></div>
    </div>

    <div id="instrucoes">
        <p><strong>Como jogar:</strong></p>
        <p>1. Clique em um lote vazio para plantar (Custo: $2).</p>
        <p>2. Espere 3 segundos até a planta crescer.</p>
        <p>3. Clique na planta madura para colher e ganhar $5!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
